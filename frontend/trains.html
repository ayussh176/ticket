<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Live Trains - APNATICKET</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4F46E5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">

<!-- Nav -->
<header class="sticky top-0 z-50 w-full border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary text-white">
                    <span class="material-symbols-outlined text-xl">confirmation_number</span>
                </div>
                <span class="text-xl font-extrabold tracking-tight uppercase">ApnaTicket</span>
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <a class="text-sm font-bold text-primary" href="trains.html">Live Trains</a>
                <a class="text-sm font-medium hover:text-primary transition-colors" href="events.html">Events</a>
            </nav>
        </div>
    </div>
</header>

<main class="py-12">
    <div class="mx-auto max-w-4xl px-4">
        
        <h1 class="text-3xl font-black mb-8 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-4xl">train</span>
            Live Train Search (IRCTC)
        </h1>

        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl p-6 border border-slate-100 dark:border-slate-800 mb-8">
            <h2 class="text-xl font-bold mb-4">Live Station Search</h2>
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Station Code (e.g. NDLS)</label>
                    <input id="stationInput" type="text" placeholder="Enter Code, e.g. BCT" class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-800 p-3" />
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Arrivals within (Hours)</label>
                    <input id="hoursInput" type="number" value="2" min="1" max="10" class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-800 p-3" />
                </div>
                <div class="flex items-end">
                    <button onclick="searchLiveStation()" class="h-[50px] px-8 rounded-xl bg-primary text-white font-bold inline-flex items-center justify-center gap-2 hover:bg-primary/90">
                        <span class="material-symbols-outlined">search</span> Search
                    </button>
                </div>
            </div>
            <p id="searchError" class="text-red-500 text-sm font-bold mt-4 hidden"></p>
        </div>

        <div id="resultsArea" class="space-y-4">
            <!-- Train cards will be injected here -->
        </div>

    </div>
</main>

<script src="js/api.js"></script>
<script>
    async function searchLiveStation() {
        const station = document.getElementById('stationInput').value.trim();
        const hours = document.getElementById('hoursInput').value;
        const err = document.getElementById('searchError');
        const results = document.getElementById('resultsArea');
        
        if (!station) {
            err.textContent = "Please enter a station code.";
            err.classList.remove('hidden');
            return;
        }
        
        err.classList.add('hidden');
        results.innerHTML = `<div class="animate-pulse bg-slate-200 dark:bg-slate-800 h-24 rounded-2xl"></div>`;

        try {
            const data = await TrainsAPI.getLiveStation(station.toUpperCase(), hours);
            results.innerHTML = ''; // Clear skeleton
            
            if (data && data.status && data.data && data.data.length > 0) {
                // Loop the array of trains and render cards
                data.data.forEach(train => {
                    const html = `
                    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow p-6 border-l-4 border-primary flex items-center justify-between">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-primary/10 text-primary px-2 py-0.5 rounded text-xs font-bold">${train.trainNumber}</span>
                                <h3 class="font-bold text-lg">${train.trainName}</h3>
                            </div>
                            <p class="text-sm text-slate-500">Expected Arrival: <strong class="text-slate-900 dark:text-white">${train.expectedArrivalTime}</strong></p>
                        </div>
                        <div class="text-right">
                            <span class="block text-xs uppercase font-bold text-slate-400">Platform</span>
                            <span class="text-2xl font-black text-primary">${train.platform || 'TBD'}</span>
                        </div>
                    </div>`;
                    results.innerHTML += html;
                });
            } else {
                results.innerHTML = `<p class="p-6 bg-yellow-50 dark:bg-yellow-900/20 text-yellow-800 dark:text-yellow-200 rounded-xl font-bold">No trains active at this station right now.</p>`;
            }
        } catch (e) {
            err.textContent = "Failed to connect to API logic: " + e.message;
            err.classList.remove('hidden');
            results.innerHTML = '';
        }
    }
</script>
</body>
</html>
